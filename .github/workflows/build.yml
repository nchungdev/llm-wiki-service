name: Comprehensive Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-client-electron:
    name: Build Client (DMG/EXE/AppImage)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install & Build
        run: |
          cd client
          npm install
          npm run build:app
      - uses: actions/upload-artifact@v4
        with:
          name: client-electron-${{ matrix.os }}
          path: |
            client/dist-build/*.dmg
            client/dist-build/*.exe
            client/dist-build/*.AppImage
            client/dist-build/*.zip

  build-server-executable:
    name: Build Server (Standalone Binary)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install & Build
        run: |
          cd server
          pip install -r requirements.txt
          pip install pyinstaller
          pyinstaller --onefile main.py --name llm-wiki-server
      - uses: actions/upload-artifact@v4
        with:
          name: server-binary-${{ matrix.os }}
          path: |
            server/dist/llm-wiki-server
            server/dist/llm-wiki-server.exe

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Server Image
        run: |
          docker build -t llm-wiki-server:latest ./server
      - name: Build Client Image
        run: |
          docker build -t llm-wiki-client:latest ./client
